<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Privé - QG</title>
    <!-- Scripts Firebase v8 (App, Database pour le texte, Storage pour les images) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <!-- Lien vers le fichier de style externe que l'on va créer après -->
    <link rel="stylesheet" href="style.css">
</<script src="reels.js" defer></script>>
<body>
    <!-- Configuration Application Mobile Mobile PWA -->
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
      }
    </script>
<script src="communications.js" defer></script>
    <!-- APPLICATION CONTAINER -->
    <div class="app-container">

        <!-- HEADER TOP (Barre supérieure style Instagram) -->
        <header class="app-header">
            <div class="logo-text">⚡ ÉlusGram</div>
            <div class="header-actions">
                <button class="icon-btn" onclick="switchView('view-dm')">❤️</button>
                <button class="icon-btn" onclick="switchView('view-dm')">💬</button>
            </div>
        </header>

        <!-- ZONE DE CONTENU DYNAMIQUE -->
        <main class="app-main">

            <!-- 1. VUE FLUX (FEED) -->
            <section id="view-feed" class="app-view active-view">
                <!-- Les stories et les publications s'afficheront ici via le JS -->
                <div id="feed-container"></div>
            </section>

            <!-- 2. VUE RECHERCHE / EXPLORE -->
            <section id="view-explore" class="app-view">
                <div class="search-bar-container">
                    <input type="text" id="search-users" placeholder="Rechercher un membre...">
                </div>
                <div class="explore-grid" id="explore-grid-container"></div>
            </section>

            <!-- 3. VUE CRÉATION DE POST -->
            <section id="view-create" class="app-view">
                <h3>Créer une publication</h3>
                <div class="upload-box">
                    <input type="file" id="file-selector" accept="image/*,video/*">
                    <textarea id="post-caption" placeholder="Écris une légende..."></textarea>
                    <button id="btn-publish" onclick="handlePublish()">Partager</button>
                </div>
            </section>

            <!-- 4. VUE MESSAGES PRIVÉS (DM) -->
            <section id="view-dm" class="app-view">
                <h3>Messages</h3>
                <div class="dm-layout">
                    <div class="threads-list" id="dm-threads"></div>
                    <div class="chat-window" id="dm-window" style="display:none;">
                        <div class="chat-header">
                            <button onclick="closeChatWindow()">⬅</button>
                            <span id="chat-target-name">Pseudo</span>
                        </div>
                        <div class="chat-messages" id="chat-messages-container"></div>
                        <div class="chat-input-row">
                            <input type="text" id="dm-input" placeholder="Message...">
                            <button onclick="sendDirectMessage()">Envoyer</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 5. VUE PROFIL -->
            <section id="view-profile" class="app-view">
                <div class="profile-header">
                    <div class="profile-avatar-container">
                        <img id="user-avatar" src="Avatar_Elu.png" alt="Avatar">
                    </div>
                    <div class="profile-stats">
                        <h4 id="profile-username">Roméo</h4>
                        <div class="stats-row">
                            <span><strong id="stat-posts">0</strong> publications</span>
                            <span><strong id="stat-followers">0</strong> abonnés</span>
                        </div>
                    </div>
                </div>
                <div class="profile-bio">
                    <p id="profile-bio-text">Élu de la matrice. 🇹🇬</p>
                </div>
                <div class="profile-grid" id="user-posts-grid"></div>
            </section>

        </main>

        <!-- BARRE DE NAVIGATION INFÉRIEURE -->
        <nav class="bottom-nav">
            <button class="nav-btn" onclick="switchView('view-feed')">🏠</button>
            <button class="nav-btn" onclick="switchView('view-explore')">🔍</button>
            <button class="nav-btn" onclick="switchView('view-create')">➕</button>
            <button class="nav-btn" onclick="switchView('view-dm')">📩</button>
            <button class="nav-btn" onclick="switchView('view-profile')">👤</button>
        </nav>

    </div>

    <script>
        // Configuration temporaire Firebase à lier plus tard avec app.js
        const firebaseConfig = {
            apiKey: "ÉCRIS_TON_API_KEY_ICI",
            authDomain: "qg-des-elus.firebaseapp.com",
            databaseURL: "https://qg-des-elus-default-rtdb.firebaseio.com/",
            projectId: "qg-des-elus",
            storageBucket: "qg-des-elus.appspot.com",
            messagingSenderId: "ÉCRIS_TON_MESSAGING_SENDER_ID_ICI",
            appId: "ÉCRIS_TON_APP_ID_ICI"
        };
        firebase.initializeApp(firebaseConfig);

        // Logique de navigation native (sans rechargement)
        function switchView(viewId) {
            document.querySelectorAll('.app-view').forEach(view => {
                view.classList.remove('active-view');
            });
            const targetView = document.getElementById(viewId);
            if(targetView) {
                targetView.classList.add('active-view');
            }
        }

        function closeChatWindow() {
            document.getElementById('dm-window').style.display = 'none';
            document.getElementById('dm-threads').style.display = 'block';
        }
    </script>
</body>
                </html>
